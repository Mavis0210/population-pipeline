services:
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: population_db
    volumes:
      - pop_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    depends_on:
      kestra:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8084:80"
    depends_on:
      pgdatabase:
        condition: service_started

  kestra_postgres:
      image: postgres:18
      volumes:
        - kestra_postgres_data:/var/lib/postgresql
      environment:
        POSTGRES_DB: kestra
        POSTGRES_USER: kestra
        POSTGRES_PASSWORD: ${KESTRA_POSTGRES_PASSWORD}
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -d 
$$
{POSTGRES_DB} -U
$$
{POSTGRES_USER}"]
        interval: 30s
        timeout: 10s
        retries: 10

  kestra:
      image: kestra/kestra:v1.1
      pull_policy: always
      user: "root"
      command: server standalone
      volumes:
        - kestra_data:/app/storage
        - /var/run/docker.sock:/var/run/docker.sock
        - kestra_tmp:/tmp/kestra-wd
      environment:
        KESTRA_CONFIGURATION: |
          datasources:
            postgres:
              url: jdbc:postgresql://kestra_postgres:5432/kestra
              driverClassName: org.postgresql.Driver
              username: kestra
              password: ${KESTRA_POSTGRES_PASSWORD}
          kestra:
            server:
              basicAuth:
                username: "admin@kestra.io"
                password: ${KESTRA_PASSWORD}
            repository:
              type: postgres
            storage:
              type: local
              local:
                basePath: "/app/storage"
            queue:
              type: postgres
            tasks:
              tmpDir:
                path: /tmp/kestra-wd/tmp
            url: http://localhost:8080/
      ports:
        - "8082:8080"
        - "8083:8081"
      depends_on:
        kestra_postgres:
          condition: service_started

volumes:
  pop_data:
  pgadmin_data:
  kestra_postgres_data:
    driver: local
  kestra_data:
    driver: local
  kestra_tmp:
    driver: local
